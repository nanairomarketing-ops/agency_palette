<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>エージェンシー・パレット</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #FFF8F0;
      --brown:      #3D2B1F;
      --brown-mid:  #7A5C45;
      --terra:      #E8976A;
      --sage:       #7DBFA7;
      --straw:      #F2D49B;
      --bubble-ai:  #FFFFFF;
      --bubble-usr: #FDE8D4;
      --radius-lg:  18px;
      --radius-sm:  10px;
      --shadow:     0 4px 24px rgba(61,43,31,.10);
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--brown);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ── */
    #app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 640px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      padding: 18px 24px 14px;
      background: var(--cream);
      border-bottom: 1.5px solid var(--straw);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    .header-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--terra), var(--straw));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: .04em;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: var(--brown-mid);
      margin-top: 1px;
      letter-spacing: .02em;
    }

    /* ── SCREENS (slide transition) ── */
    #screens {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    .screen {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      transition: transform .55s cubic-bezier(.77,0,.18,1);
      display: flex;
      flex-direction: column;
    }
    #screen-chat   { transform: translateX(0); }
    #screen-palette { transform: translateX(100%); }
    body.show-palette #screen-chat    { transform: translateX(-100%); }
    body.show-palette #screen-palette { transform: translateX(0); }

    /* ── CHAT ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb {
      background: var(--straw); border-radius: 4px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: msgIn .32s ease both;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg.ai  { align-self: flex-start; }
    .msg.usr { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage), var(--straw));
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      margin-top: 2px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 14.5px;
      line-height: 1.75;
      letter-spacing: .01em;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.ai  .bubble {
      background: var(--bubble-ai);
      border-bottom-left-radius: var(--radius-sm);
      color: var(--brown);
    }
    .msg.usr .bubble {
      background: var(--bubble-usr);
      border-bottom-right-radius: var(--radius-sm);
      color: var(--brown);
    }

    /* typing indicator */
    .typing-dots {
      display: flex; gap: 5px;
      padding: 14px 18px;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--terra);
      border-radius: 50%;
      animation: dot 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot {
      0%,80%,100% { transform:scale(.7); opacity:.4; }
      40%          { transform:scale(1);  opacity:1;  }
    }

    /* ── INPUT ── */
    #chat-input-area {
      flex-shrink: 0;
      padding: 12px 16px 16px;
      background: var(--cream);
      border-top: 1.5px solid var(--straw);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--straw);
      border-radius: var(--radius-lg);
      padding: 11px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 300;
      background: #fff;
      color: var(--brown);
      outline: none;
      transition: border-color .2s;
      max-height: 120px;
      line-height: 1.6;
    }
    #user-input:focus { border-color: var(--terra); }
    #user-input::placeholder { color: #C5A88A; }

    #send-btn {
      width: 44px; height: 44px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--terra), #D4785A);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 3px 12px rgba(232,151,106,.45);
    }
    #send-btn:hover  { transform: scale(1.07); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── PALETTE SCREEN ── */
    #screen-palette {
      overflow-y: auto;
      padding: 28px 20px 48px;
      gap: 0;
    }
    #screen-palette::-webkit-scrollbar { width: 4px; }
    #screen-palette::-webkit-scrollbar-thumb {
      background: var(--straw); border-radius: 4px;
    }

    .palette-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .palette-header .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--terra), var(--straw));
      color: var(--brown);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .palette-header h2 {
      font-family: 'Shippori Mincho', serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: .03em;
      color: var(--brown);
    }
    .palette-header p {
      margin-top: 8px;
      font-size: 13px;
      color: var(--brown-mid);
    }

    .chart-wrap {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 20px 16px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      position: relative;
    }
    .chart-wrap canvas { max-height: 300px; }

    .score-labels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .score-labels .item-5 { grid-column: 1 / -1; }
    .score-item {
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .score-item .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .score-item .label {
      font-size: 12px;
      color: var(--brown-mid);
      flex: 1;
    }
    .score-item .val {
      font-family: 'Shippori Mincho', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--brown);
    }

    .commentary-card {
      background: linear-gradient(135deg, #FFF3E8, #FEF9F0);
      border: 1.5px solid var(--straw);
      border-radius: var(--radius-lg);
      padding: 22px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .commentary-card h3 {
      font-family: 'Shippori Mincho', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--terra);
      margin-bottom: 10px;
      letter-spacing: .05em;
    }
    .commentary-card p {
      font-size: 14px;
      line-height: 1.85;
      color: var(--brown);
    }

    #restart-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--terra);
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--terra);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background .2s, color .2s;
      letter-spacing: .04em;
    }
    #restart-btn:hover {
      background: var(--terra);
      color: #fff;
    }

    /* dot colors */
    .c1 { background: #E8976A; }
    .c2 { background: #7DBFA7; }
    .c3 { background: #F2C46A; }
    .c4 { background: #A08CBF; }
    .c5 { background: #85B8D4; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-icon">🎨</div>
    <div class="header-text">
      <h1>エージェンシー・パレット</h1>
      <p>絵本が育てる、その子だけの光</p>
    </div>
  </header>

  <div id="screens">

    <!-- ── CHAT SCREEN ── -->
    <div class="screen" id="screen-chat">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <div class="input-row">
          <textarea
            id="user-input"
            rows="1"
            placeholder="最近の絵本エピソードをおしえてください…"
          ></textarea>
          <button id="send-btn" aria-label="送信">➤</button>
        </div>
      </div>
    </div>

    <!-- ── PALETTE SCREEN ── -->
    <div class="screen" id="screen-palette">
      <div class="palette-header">
        <div class="badge">✨ TODAY'S PALETTE</div>
        <h2>今週のパレットが<br>完成しました！</h2>
        <p id="palette-date"></p>
      </div>

      <div class="chart-wrap">
        <canvas id="radar-chart"></canvas>
      </div>

      <div class="score-labels" id="score-labels"></div>

      <div class="commentary-card">
        <h3>📖 あなたのまなざしより</h3>
        <p id="commentary-text"></p>
      </div>

      <button id="restart-btn">✦ あらたなパレットをつくる</button>
    </div>

  </div>
</div>

<script>
/* ────────────────────────────────────────────
   STATE
──────────────────────────────────────────── */
let chatHistory = [];
let radarChart  = null;
let isSending   = false;

const LABELS = [
  { key:'s1', name:'出会い', emoji:'🌱', cls:'c1' },
  { key:'s2', name:'まほう', emoji:'✨', cls:'c2' },
  { key:'s3', name:'おすそわけ', emoji:'🌸', cls:'c3' },
  { key:'s4', name:'つづき', emoji:'🌈', cls:'c4' },
  { key:'s5', name:'まなざし', emoji:'👁', cls:'c5' },
];

/* ────────────────────────────────────────────
   ELEMENTS
──────────────────────────────────────────── */
const messagesEl  = document.getElementById('chat-messages');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');

/* ────────────────────────────────────────────
   CHAT HELPERS
──────────────────────────────────────────── */
function appendMsg(role, text) {
  const isAi = role === 'ai';
  const wrap = document.createElement('div');
  wrap.className = `msg ${isAi ? 'ai' : 'usr'}`;

  if (isAi) {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '🌿';
    wrap.appendChild(av);
  }

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;
  wrap.appendChild(bub);

  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bub;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'typing-indicator';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = '🌿';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  bub.appendChild(dots);
  wrap.appendChild(av);
  wrap.appendChild(bub);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

/* ────────────────────────────────────────────
   AUTO-RESIZE TEXTAREA
──────────────────────────────────────────── */
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});
sendBtn.addEventListener('click', handleSend);

/* ────────────────────────────────────────────
   SEND
──────────────────────────────────────────── */
async function handleSend() {
  const text = inputEl.value.trim();
  if (!text || isSending) return;

  isSending = true;
  sendBtn.disabled = true;

  appendMsg('usr', text);
  chatHistory.push({ role: 'user', content: text });

  inputEl.value = '';
  inputEl.style.height = 'auto';

  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatHistory }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err}`);
    }

    const data = await res.json();
    removeTyping();

    if (data.status === 'COMPLETE') {
      appendMsg('ai', '今週のパレットが完成しました！✨');
      await sleep(900);
      showPalette(data.scores, data.commentary);
    } else {
      const reply = data.reply || 'ごめんなさい、うまく受け取れませんでした。';
      appendMsg('ai', reply);
      chatHistory.push({ role: 'assistant', content: reply });
    }

  } catch (err) {
    removeTyping();
    console.error(err);
    appendMsg('ai', `⚠️ エラーが発生しました: ${err.message}`);
  } finally {
    isSending = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ────────────────────────────────────────────
   PALETTE SCREEN
──────────────────────────────────────────── */
function showPalette(scores, commentary) {
  // date
  const now = new Date();
  document.getElementById('palette-date').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  // score labels
  const labelsEl = document.getElementById('score-labels');
  labelsEl.innerHTML = '';
  LABELS.forEach((l, i) => {
    const val = scores[l.key] ?? 0;
    const item = document.createElement('div');
    item.className = `score-item${i === 4 ? ' item-5' : ''}`;
    item.innerHTML = `
      <div class="dot ${l.cls}"></div>
      <div class="label">${l.emoji} ${l.name}</div>
      <div class="val">${val}</div>`;
    labelsEl.appendChild(item);
  });

  // commentary
  document.getElementById('commentary-text').textContent =
    commentary || '';

  // transition
  document.body.classList.add('show-palette');

  // draw chart (after transition)
  setTimeout(() => drawRadar(scores), 300);
}

function drawRadar(scores) {
  const ctx = document.getElementById('radar-chart').getContext('2d');
  if (radarChart) radarChart.destroy();

  const vals = LABELS.map(l => scores[l.key] ?? 0);
  const labels = LABELS.map(l => `${l.emoji} ${l.name}`);

  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        label: 'パレット',
        data: vals,
        backgroundColor: 'rgba(232,151,106,.18)',
        borderColor: '#E8976A',
        borderWidth: 2.5,
        pointBackgroundColor: '#E8976A',
        pointRadius: 5,
        pointHoverRadius: 7,
      }],
    },
    options: {
      animation: {
        duration: 1100,
        easing: 'easeInOutQuart',
      },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: {
            stepSize: 25,
            backdropColor: 'transparent',
            color: '#C5A88A',
            font: { size: 10, family: 'Noto Sans JP' },
          },
          grid:       { color: 'rgba(242,212,155,.6)' },
          angleLines: { color: 'rgba(242,212,155,.6)' },
          pointLabels: {
            color: '#3D2B1F',
            font: { size: 12, family: 'Noto Sans JP', weight: '400' },
          },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.r} / 100`,
          },
        },
      },
    },
  });
}

/* ────────────────────────────────────────────
   RESTART
──────────────────────────────────────────── */
document.getElementById('restart-btn').addEventListener('click', () => {
  chatHistory = [];
  messagesEl.innerHTML = '';
  document.getElementById('commentary-text').textContent = '';
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  document.body.classList.remove('show-palette');
  setTimeout(initGreeting, 300);
});

/* ────────────────────────────────────────────
   INIT
──────────────────────────────────────────── */
function initGreeting() {
  const greeting =
    'こんにちは！わたしは絵本保育士のさくらです 🌸\n\n' +
    'このパレットは、お子さんの絵本との"きらきら"を一緒に見つける場所です。\n\n' +
    '最近、お子さんと絵本でどんな時間を過ごしましたか？ ' +
    'どんな小さなエピソードでも、ぜひ聞かせてください ✨';
  appendMsg('ai', greeting);
  chatHistory.push({ role: 'assistant', content: greeting });
}

initGreeting();
</script>
</body>
</html>
