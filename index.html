<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>エージェンシー・パレット</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif}
body{background:#f8f9fa;color:#212529;line-height:1.5;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;border:none;outline:none;transition:all .15s ease}
button:active{transform:scale(0.98)}
.app-container{width:100%;max-width:600px;margin:0 auto;padding:12px;display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:12px}
.tab-container{display:flex;background:#eee;border-radius:12px;padding:4px;margin-bottom:12px}
.tab-btn{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:#6c757d;background:transparent;border-radius:10px}
.tab-btn.active{background:#fff;color:#1d9e75;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.panel{background:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.05);padding:16px;flex:1;display:flex;flex-direction:column;position:relative}
.chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-bottom:40px;max-height:60vh}
.bubble{display:flex;align-items:flex-end;gap:8px;max-width:85%}
.bubble.bot{align-self:flex-start}
.bubble.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;background:#e1f5ee;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.text{padding:12px 14px;border-radius:16px;font-size:14px;white-space:pre-wrap;word-break:break-word}
.bot .text{background:#f1f3f5;color:#212529;border-top-left-radius:4px}
.user .text{background:#1d9e75;color:#fff;border-top-right-radius:4px}
.input-container{display:flex;gap:8px;border-top:1px solid #f1f3f5;padding-top:12px;margin-top:auto}
.text-input{flex:1;padding:12px;border:1px solid #dee2e6;border-radius:12px;font-size:14px;outline:none;background:#f8f9fa}
.text-input:focus{background:#fff;border-color:#1d9e75}
.send-btn{padding:0 20px;background:#1d9e75;color:#fff;border-radius:12px;font-size:14px;font-weight:600}
.palette-grid{display:grid;grid-template-columns:1fr;gap:16px}
.chart-box{background:#fff;border:1px solid #f1f3f5;border-radius:16px;padding:16px;display:flex;justify-content:center;align-items:center;height:240px;position:relative}
.commentary-box{background:#f8f9fa;border-left:4px solid #1d9e75;border-radius:8px;padding:14px;font-size:13.5px;line-height:1.6;color:#495057;white-space:pre-wrap}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.dot-loading{display:flex;gap:4px;padding:12px 16px;background:#f1f3f5;border-radius:16px}
.dot{width:6px;height:6px;background:#adb5bd;border-radius:50%;animation:bounce 1.4s infinite ease-in-out both}
.dot:nth-child(1){animation-delay:-0.32s}
.dot:nth-child(2){animation-delay:-0.16s}
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div>
      <h1 style="font-size:16px;font-weight:700;color:#1a1a18">🎨 エージェンシー・パレット</h1>
      <p style="font-size:11px;color:#888780">子どもの輝きと、親のまなざしの記録</p>
    </div>
    <span style="font-size:11px;padding:4px 10px;border-radius:20px;background:#e1f5ee;color:#0f6e56;font-weight:600">対話</span>
  </div>

  <div class="tab-container">
    <button class="tab-btn active" id="tab-chat" onclick="switchView('chat')">💬 まなざしトーク</button>
    <button class="tab-btn" id="tab-palette" onclick="switchView('palette')" disabled>🎨 パレット</button>
  </div>

  <div class="panel" id="panel-chat">
    <div class="chat-area" id="chat-area"></div>
    <div class="input-container" id="input-container">
      <input type="text" class="text-input" id="text-input" placeholder="ベッドの上で、一言つぶやく感覚でどうぞ..." onkeypress="handleKeyPress(event)">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">送信</button>
    </div>
  </div>

  <div class="panel" id="panel-palette" style="display:none;">
    <div class="palette-grid">
      <div class="chart-box">
        <canvas id="paletteChart"></canvas>
      </div>
      <div style="font-size:14px;font-weight:600;color:#333;margin-top:8px;">✨ まなざしフィードバック</div>
      <div class="commentary-box" id="commentary-text"></div>
      <button onclick="location.reload()" style="margin-top:16px;padding:12px;background:#f1f3f5;color:#6c757d;font-size:13px;font-weight:600;border-radius:12px;">新しく記録を始める</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let chatHistory = [];
let chartInstance = null;

const chatArea = document.getElementById('chat-area');
const inputContainer = document.getElementById('input-container');
const textInput = document.getElementById('text-input');

function init() {
  const firstMsg = "こんばんは。今週（最近）、お子さんとどんな風に本を読みましたか？あるいは、何か印象に残っている絵本での一幕や、きらっとした瞬間はありましたか？ベッドの上でつぶやく感覚で、ゆるく教えてくださいね😊";
  showBotMessage(firstMsg);
  chatHistory.push({ role: "model", text: firstMsg });
}

function showBotMessage(text) {
  const b = document.createElement('div');
  b.className = 'bubble bot';
  b.innerHTML = `<div class="avatar">📖</div><div class="text">${text}</div>`;
  chatArea.appendChild(b);
  scrollToBottom();
}

function showUserMessage(text) {
  const b = document.createElement('div');
  b.className = 'bubble user';
  b.innerHTML = `<div class="text">${text}</div>`;
  chatArea.appendChild(b);
  scrollToBottom();
}

function showLoading() {
  const b = document.createElement('div');
  b.className = 'bubble bot';
  b.id = 'loading-bubble';
  b.innerHTML = `<div class="avatar">📖</div><div class="dot-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatArea.appendChild(b);
  scrollToBottom();
}

function removeLoading() {
  const el = document.getElementById('loading-bubble');
  if (el) el.remove();
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text) return;

  textInput.value = '';
  showUserMessage(text);
  chatHistory.push({ role: "user", text: text });

  showLoading();

  try {
    // URLをトップ直下の /chat.js (または /chat ) に直接指定してVercelの誤認識を完全破壊！
    const paths = ['/chat', '/chat.js'];
    let res = null;
    for (const p of paths) {
      try {
        res = await fetch(p, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chatHistory: chatHistory })
        });
        if (res.ok) break;
      } catch(e){}
    }
    
    const data = await res.json();
    removeLoading();

    if (data.status === "COMPLETE") {
      document.getElementById('tab-palette').disabled = false;
      document.getElementById('commentary-text').textContent = data.commentary;
      switchView('palette');
      renderPaletteChart(data.scores);
      showBotMessage("今週のパレットが完成しました！タブを切り替えて確認してください✨");
    } else {
      showBotMessage(data.reply);
      chatHistory.push({ role: "model", text: data.reply });
    }

  } catch (e) {
    removeLoading();
    // もし404エラーを掴んでしまったら、スマホ側で緊急メッセージを返す
    showBotMessage("お話を聞かせていただき、本当にありがとうございます😊 お子さんがその本に没頭したりフレーズを話したりしている時、親御さんから見てどんな表情や様子が一番印象に残っていますか？ぜひゆるく教えてください✨");
  }
}

function handleKeyPress(e) {
  if (e.key === 'Enter') sendMessage();
}

function switchView(view) {
  if (view === 'chat') {
    document.getElementById('panel-chat').style.display = 'flex';
    document.getElementById('panel-palette').style.display = 'none';
    document.getElementById('tab-chat').className = 'tab-btn active';
    document.getElementById('tab-palette').className = 'tab-btn';
  } else {
    document.getElementById('panel-chat').style.display = 'none';
    document.getElementById('panel-palette').style.display = 'flex';
    document.getElementById('tab-chat').className = 'tab-btn';
    document.getElementById('tab-palette').className = 'tab-btn active';
  }
}

function renderPaletteChart(scores) {
  const ctx = document.getElementById('paletteChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['①自発性', '②没頭', '③日常の溢れ出し', '④遊びの昇華', '⑤環境のデザイン'],
      datasets: [{
        label: '彩り',
        data: [scores.s1 || 80, scores.s2 || 80, scores.s3 || 80, scores.s4 || 80, scores.s5 || 80],
        backgroundColor: 'rgba(29, 158, 117, 0.2)',
        borderColor: '#1d9e75',
        borderWidth: 2,
        pointBackgroundColor: '#1d9e75'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0,
          max: 100,
          ticks: { display: false, stepSize: 20 },
          grid: { color: 'rgba(0,0,0,0.05)' },
          pointLabels: { font: { size: 11, weight: '600' }, color: '#495057' }
        }
      }
    }
  });
}

init();
</script>
</body>
</html>
